# The observatory heartbeat. GitHub throttles cron schedules heavily (they
# can fire hourly or worse), so each run observes for ~30 minutes and then
# dispatches its own successor — a self-perpetuating chain. The cron is the
# backstop that revives the chain if a link ever fails. Raw snapshots and
# engine state ride the Actions cache (working memory, not the permanent
# record); only compact graded data enters git.

name: Observe

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

concurrency:
  group: observe
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  observe:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -e .

      - name: Restore working memory (raw window + truth-engine state)
        uses: actions/cache/restore@v4
        with:
          path: |
            data/raw
            data/state.json
          key: overdue-state-${{ github.run_id }}
          restore-keys: overdue-state-

      - name: Observation burst (30 snapshots, 60 s apart; grades only)
        env:
          OVERDUE_511_KEY: ${{ secrets.OVERDUE_511_KEY }}
        run: overdue observe --snapshots 30 --interval 60 --no-site

      - name: Prune raw snapshots older than 2 days
        run: overdue prune

      - name: Save working memory
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/raw
            data/state.json
          key: overdue-state-${{ github.run_id }}

      # Observed data is committed BEFORE publication is attempted: a
      # sanity-contract failure may block the site update, but it can
      # never again cost a burst's graded record.
      - name: Commit the graded record (unconditional)
        if: always()
        run: |
          git config user.name "overdue-observatory"
          git config user.email "actions@github.com"
          git add data/graded docs/data/meta.json
          if git diff --cached --quiet; then
            echo "nothing new to commit"
          else
            git commit -m "observe: $(date -u +'%Y-%m-%d %H:%M') UTC (grades)"
            for attempt in 1 2 3; do
              if git pull --rebase origin main; then break; fi
              for f in $(git diff --name-only --diff-filter=U); do
                git checkout --theirs "$f" && git add "$f"
              done
              GIT_EDITOR=true git rebase --continue || git rebase --abort
            done
            git push
          fi

      - name: Build site data (sanity contract gates publication)
        run: overdue build-site

      - name: Commit the published site data
        run: |
          git add docs/data
          if git diff --cached --quiet; then
            echo "site data unchanged"
          else
            git commit -m "observe: $(date -u +'%Y-%m-%d %H:%M') UTC (site)"
            for attempt in 1 2 3; do
              if git pull --rebase origin main; then break; fi
              for f in $(git diff --name-only --diff-filter=U); do
                git checkout --theirs "$f" && git add "$f"
              done
              GIT_EDITOR=true git rebase --continue || git rebase --abort
            done
            git push
          fi

      - name: Dispatch the next link in the chain
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run observe.yml -R ${{ github.repository }}
